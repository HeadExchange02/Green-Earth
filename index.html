<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- Tailwind & Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>

    <main class="container text-center mx-auto bg-green-300">

        <h1 class="text-green-500 font-bold text-3xl">Green Earth</h1>

        <div class="grid grid-cols-4 gap-4">
            <div class="bg-white card card-body shadow-xl col-span-1 space-y-3">
                <button id="allTreesbtn" class="btn btn-soft btn-success w-full">All Trees</button>

                <!-- Categories Buttons Container -->
                <div id="categoriesContainer" class="space-y-3">
                    <!-- Categories Buttons will show here Dinamically through API -->
                </div>
            </div>

            <!-- Trees Container -->
            <div class="bg-white card card-body shadow-xl col-span-2">
                <h2 class="font-bold text-2xl">Trees</h2>
            </div>

            <!-- Cart Container -->
            <div class="bg-white card card-body shadow-xl col-span-1">
                <Cart class="font-bold text-2xl">Cart</h2>
            </div>
        </div>

    </main>




    <script src="Scripts/script.js"></script>

</body>

</html>
